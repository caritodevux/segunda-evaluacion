<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de usuarios para empresa pequeña</title>
</head>
<body>
    <h1>Sistema de gestión de usuarios</h1>
    <h2>Registro de Usuarios</h2>
    <p>Por favor ingrese los datos del usuario</p>
    <p>Nombre</p>
    <input type="text" id="nombre" placeholder="nombre del usuario">
    <p>Edad</p>
    <input type="number" id="edad" placeholder="edad en años">
    <p>Rol</p>
    <select id="rol" name="Rol del Usuario">
        <option value="administrador">Administrador</option>
        <option value="usuario">Usuario</option></select>
    <button id="btn-agregar">Agregar usuario</button>
    <br> <!-- Quitar cuando aplique estilos css -->
    <p id="mensaje-feedback"></p>
    <br> <!-- Quitar cuando aplique estilos css -->
    <h2>Estadisticas</h2>
    <p>Activos</p>
    <p>Inactivos</p>
    <h2>Usuarios registrados en el sistema</h2>
    <select id="filtro-rol">
        <option value="todos">Todos</option>
        <option value="administrador">Solo administradores</option>
        <option value="usuario">Solo usuarios</option></select>
    <!-- <ul id="lista-usuarios"></ul> -->
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-usuarios">
        </tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
