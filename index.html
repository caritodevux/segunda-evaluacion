<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Gestión de Usuarios</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 8px; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1">Panel de Administración</span>
        </div>
    </nav>

    <div class="container-fluid py-4 px-lg-5">
        <div class="row g-4">
            
            <div class="col-12 col-lg-3">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white fw-bold">
                        Nuevo Usuario
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Nombre Completo</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Ej. Juan Pérez">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small mb-1">Edad</label>
                            <input type="number" id="edad" class="form-control" placeholder="Años">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small mb-1">Rol en el sistema</label>
                            <select id="rol" class="form-select">
                                <option value="administrador">Administrador</option>
                                <option value="usuario">Usuario</option>
                            </select>
                        </div>
                        <button id="btn-agregar" class="btn btn-primary w-100 fw-bold">Registrar</button>
                        <p id="mensaje-feedback" class="mt-3 mb-0 text-center small fw-bold"></p>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold text-secondary">
                        Resumen de Sistema
                    </div>
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center mb-2 mt-2">
                            <span>Usuarios Activos</span>
                            <span id="contador-activos" class="badge bg-success rounded-pill px-3">0</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span>Usuarios Inactivos</span>
                            <span id="contador-inactivos" class="badge bg-danger rounded-pill px-3">0</span>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-12 col-lg-9">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white d-flex flex-column flex-md-row justify-content-between align-items-md-center py-3 gap-3">
                        <h5 class="mb-0 fw-bold text-secondary">Base de Datos</h5>
                        
                        <div class="d-flex flex-column flex-sm-row gap-2">
                            <select id="filtro-rol" class="form-select form-select-sm border-secondary">
                                <option value="todos">Todos los roles</option>
                                <option value="administrador">Administradores</option>
                                <option value="usuario">Usuarios base</option>
                            </select>
                            
                            <select id="filtro-edad" class="form-select form-select-sm border-secondary">
                                <option value="todas">Todas las edades</option>
                                <option value="menores-18">Menores de 18</option>
                                <option value="18-35">18 a 35 años</option>
                                <option value="mayores-35">Mayores de 35</option>
                            </select>
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-secondary">
                                    <tr>
                                        <th class="ps-4">Nombre</th>
                                        <th>Edad</th>
                                        <th>Rol</th>
                                        <th>Estado</th>
                                        <th class="text-end pe-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-usuarios">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
